{{ define "main" }}
  <div class="page-layout">
    <div class="page-content">
      {{ if not .IsHome }}
        <h1>{{ partial "page-title-text.html" . }}</h1>
      {{ end }}
      {{ .Content }}

      {{ if and .Pages (ne .Params.showList false) }}
        <ul>
          {{ range .Pages }}
            <li><a href="{{ .RelPermalink }}">{{ partial "page-title-text.html" . }}</a></li>
          {{ end }}
        </ul>
      {{ end }}
    </div>
  </div>
{{ end }}
