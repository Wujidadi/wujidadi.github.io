<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {{- $favicon := "favicon.svg" | relURL -}}
  <link rel="icon" type="image/svg+xml" href="{{ $favicon }}">
  <link rel="icon" type="image/png" sizes="512x512" href="{{ "favicon.png" | relURL }}">
  <meta name="theme-color" content="#d2aa38">
  {{- $pageTitle := partial "page-title-text.html" . -}}
  <title>{{ if ne $pageTitle .Site.Title }}{{ $pageTitle }} | {{ end }}{{ .Site.Title }}</title>
  <style>
    :root {
      color-scheme: dark;
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      min-height: 100vh;
      background-color: #0d1117;
      background-image:
        radial-gradient(ellipse at top center, rgba(210, 170, 56, 0.22), rgba(13, 17, 23, 0) 64%),
        linear-gradient(135deg, #0d1117 0%, #111827 100%);
      color: #c9d1d9;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      line-height: 1.65;
    }
    body.home-body {
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 50%, rgba(90, 240, 210, 0.16), rgba(3, 7, 13, 0) 30%),
        radial-gradient(ellipse at 50% 58%, rgba(60, 120, 255, 0.13), rgba(3, 7, 13, 0) 42%),
        #03070d;
    }
    .markdown-body {
      max-width: 980px;
      margin: 0 auto;
      padding: 40px 24px 56px;
      word-wrap: break-word;
    }
    .page-layout {
      display: block;
      position: relative;
    }
    .page-content {
      min-width: 0;
      padding: 28px clamp(20px, 3vw, 40px);
      background: rgba(22, 27, 34, 0.9);
      border: 1px solid #30363d;
      border-radius: 18px;
      box-shadow: 0 18px 48px rgba(1, 4, 9, 0.28);
    }
    .page-content > :first-child,
    .page-content > article > :first-child {
      margin-top: 0;
    }
    .markdown-body h1,
    .markdown-body h2 {
      padding-bottom: 0.3em;
      border-bottom: 1px solid #21262d;
    }
    .markdown-body h1,
    .markdown-body h2,
    .markdown-body h3,
    .markdown-body h4,
    .markdown-body h5,
    .markdown-body h6 {
      margin: 24px 0 16px;
      font-weight: 600;
      line-height: 1.25;
    }
    .markdown-body p,
    .markdown-body ul,
    .markdown-body ol,
    .markdown-body blockquote,
    .markdown-body table,
    .markdown-body pre {
      margin-top: 0;
      margin-bottom: 16px;
    }
    .markdown-body ul,
    .markdown-body ol {
      padding-left: 2em;
    }
    .markdown-body a {
      color: #d8b94e;
      text-decoration: none;
    }
    .markdown-body a:hover {
      text-decoration: underline;
    }
    .markdown-body code,
    .markdown-body pre {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }
    .markdown-body code {
      padding: 0.18em 0.5em;
      font-size: 85%;
      color: #f0e1ad;
      background: #182235;
      border: 1px solid #273244;
      border-radius: 7px;
    }
    .markdown-body pre {
      padding: 16px;
      overflow: auto;
      font-size: 85%;
      line-height: 1.45;
      background: #111827;
      border: 1px solid #273244;
      border-radius: 10px;
    }
    .markdown-body pre code {
      padding: 0;
      color: inherit;
      background: transparent;
      border: 0;
      border-radius: 0;
    }
    .markdown-body img {
      max-width: 100%;
      height: auto;
      border-radius: 12px;
    }
    .site-footer {
      max-width: 980px;
      margin: 0 auto;
      padding: 0 24px 32px;
      color: #8b949e;
      font-size: 0.875rem;
      text-align: center;
    }
    .site-home {
      position: relative;
      display: grid;
      min-height: 100vh;
      place-items: center;
      overflow: hidden;
      padding: 24px;
      isolation: isolate;
    }
    .site-home::before,
    .site-home::after {
      position: fixed;
      inset: -20%;
      z-index: -1;
      content: "";
      pointer-events: none;
    }
    .site-home::before {
      background-image:
        repeating-linear-gradient(90deg, rgba(92, 255, 205, 0.08) 0 1px, transparent 1px 56px),
        repeating-linear-gradient(0deg, rgba(92, 255, 205, 0.05) 0 1px, transparent 1px 56px),
        linear-gradient(115deg, transparent 0 42%, rgba(0, 255, 170, 0.16) 45%, transparent 49% 100%);
      opacity: 0.78;
      transform: perspective(720px) rotateX(58deg) translateY(10%);
      transform-origin: center bottom;
    }
    .site-home::after {
      background:
        radial-gradient(circle at 20% 18%, rgba(255, 255, 255, 0.45) 0 1px, transparent 1.5px),
        radial-gradient(circle at 78% 28%, rgba(255, 255, 255, 0.35) 0 1px, transparent 1.5px),
        radial-gradient(circle at 67% 72%, rgba(255, 255, 255, 0.3) 0 1px, transparent 1.5px),
        radial-gradient(ellipse at 50% 50%, transparent 0 35%, rgba(94, 234, 212, 0.16) 36%, transparent 42%),
        radial-gradient(ellipse at 50% 52%, rgba(3, 7, 13, 0) 0 32%, rgba(0, 0, 0, 0.52) 66%);
      background-size: 220px 220px, 280px 280px, 180px 180px, 100% 100%, 100% 100%;
      opacity: 0.82;
    }
    .home-entry {
      color: #eafff8;
      font-size: clamp(1.25rem, 3vw, 2.35rem);
      font-weight: 650;
      letter-spacing: 0.14em;
      line-height: 1.3;
      text-align: center;
      text-transform: uppercase;
      text-shadow:
        0 0 12px rgba(94, 234, 212, 0.5),
        0 0 34px rgba(59, 130, 246, 0.38);
    }
    .home-entry p {
      margin: 0;
    }
    @media (max-width: 767px) {
      .markdown-body {
        padding: 20px 16px 32px;
      }
      .page-content {
        padding: 20px 16px 24px;
      }
      .home-entry {
        letter-spacing: 0.08em;
      }
    }
  </style>
</head>
<body{{ if .IsHome }} class="home-body"{{ end }}>
  <main class="{{ if .IsHome }}site-home{{ else }}markdown-body{{ end }}">
    {{ block "main" . }}{{ end }}
  </main>
  {{ if not .IsHome }}
    <footer class="site-footer">
      &copy; {{ now.Year }} CCK, Wujidadi (Taras Alatmiuë).
    </footer>
  {{ end }}
</body>
</html>
